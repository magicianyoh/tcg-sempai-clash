<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Narrative - Deck Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.4rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 15px;
            display: grid;
            grid-template-columns: 230px 1fr 280px;
            gap: 15px;
            height: calc(100vh - 70px);
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
        }

        .panel h2 {
            margin-bottom: 12px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Archetypes */
        .archetype-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .archetype-btn {
            padding: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .archetype-btn:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .archetype-btn.selected {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.2);
        }

        .archetype-btn .name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .archetype-btn .desc {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 3px;
        }

        /* Type Filters */
        .filter-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .filter-tab:hover,
        .filter-tab.active {
            background: rgba(78, 205, 196, 0.2);
            border-color: #4ecdc4;
            color: #fff;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }

        .card {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            min-height: 100px;
        }

        .card:hover {
            border-color: #4ecdc4;
            transform: translateY(-2px);
        }

        .card.selected {
            border-color: #4ecdc4;
            background: rgba(78, 205, 196, 0.1);
        }

        .card.in-deck {
            opacity: 0.4;
        }

        .card .type-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 0.55rem;
            text-transform: uppercase;
        }

        .card .type-badge.protagonist {
            background: #e94560;
        }

        .card .type-badge.personaje,
        .card .type-badge.character {
            background: #3498db;
        }

        .card .type-badge.item {
            background: #f39c12;
        }

        .card .type-badge.location {
            background: #9b59b6;
        }

        .card .type-badge.event,
        .card .type-badge.event_key {
            background: #2ecc71;
        }

        .card .type-badge.event_final {
            background: #ffd700;
            color: #000;
        }

        .card .type-badge.filler {
            background: #7f8c8d;
        }

        .card .name {
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 4px;
            margin-top: 18px;
        }

        .card .cost {
            position: absolute;
            top: 6px;
            left: 6px;
            width: 20px;
            height: 20px;
            background: #e94560;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .card .desc {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.2;
        }

        .card .count {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.7rem;
        }

        /* Deck Panel */
        .deck-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .deck-count {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .deck-count.complete {
            color: #4ecdc4;
        }

        .deck-count.over {
            color: #e94560;
        }

        .deck-select-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .deck-dropdown {
            flex: 1;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.85rem;
        }

        .deck-dropdown option {
            background: #1a1a2e;
        }

        .load-btn {
            padding: 8px 12px;
            border: 1px solid #4ecdc4;
            border-radius: 6px;
            background: transparent;
            color: #4ecdc4;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .load-btn:hover {
            background: rgba(78, 205, 196, 0.1);
        }

        .deck-name-input {
            width: 100%;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .deck-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: calc(100vh - 420px);
            overflow-y: auto;
        }

        .deck-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .bg-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .bg-option {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            border: 2px solid transparent;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            background-color: #333;
        }

        .bg-option.selected {
            border-color: #4ecdc4;
            box-shadow: 0 0 5px #4ecdc4;
        }

        .deck-item .remove-btn {
            background: #e94560;
            border: none;
            color: #fff;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .save-btn,
        .continue-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-btn {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: #fff;
        }

        .save-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .continue-btn {
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: #fff;
            display: none;
        }

        .continue-btn:hover {
            transform: translateY(-1px);
        }

        .message {
            text-align: center;
            margin-top: 8px;
            font-size: 0.8rem;
        }

        .message.success {
            color: #4ecdc4;
        }

        .message.error {
            color: #e94560;
        }
    </style>
</head>

                <button class="filter-tab" data-type="PERSONAJE">Personaje</button>
                <button class="filter-tab" data-type="ITEM">Objeto</button>
                <button class="filter-tab" data-type="LOCATION">Locación</button>
                <button class="filter-tab" data-type="EVENT">Evento</button>
            </div>
            <div class="cards-grid" id="cards-grid">
                <p style="color: rgba(255,255,255,0.5); grid-column: 1/-1; text-align: center;">
                    Selecciona un arquetipo
                </p>
            </div>
        </div>

        <div class="panel" id="deck-panel">
            <div class="deck-header">
                <h2>Tu Mazo</h2>
                <span class="deck-count" id="deck-count">0/20</span>
            </div>
            <div class="deck-select-row">
                <select class="deck-dropdown" id="deck-dropdown">
                    <option value="">--- Nuevo Mazo ---</option>

                <button class="load-btn" id="load-btn">Cargar</button>

            <input type="text" class="deck-name-input" id="deck-name" placeholder="Nombre del mazo..." value="Mi Mazo">

            <!-- Background Selector -->
            <div style="margin-bottom: 5px; font-size: 0.8rem; color: rgba(255,255,255,0.7);">Fondo de Tablero:</div>
            <div class="bg-selector" id="bg-selector">
                <!-- Populated by JS -->
            </div>

            <div class="deck-list" id="deck-list">
                <p style="color: rgba(255,255,255,0.5); text-align: center;">
                    Haz clic en las cartas para agregarlas
                </p>
            </div>
            <div class="btn-row">
                <button class="save-btn" id="save-btn" disabled>Guardar</button>
                <button class="continue-btn" id="continue-btn">Jugar →</button>
            </div>
            <p class="message" id="message"></p>
        </div>
    </div>

        // Render archetype buttons
        function renderArchetypes() {
            const list = document.getElementById('archetype-list');
            list.innerHTML = Object.entries(ARCHETYPES).map(([key, arch]) => `
                <button class="archetype-btn" data-archetype="${key}">
                    <div class="name">${arch.name}</div>
                    <div class="desc">${arch.desc}</div>
                </button>
            `).join('');

            list.querySelectorAll('.archetype-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.archetype-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedArchetype = btn.dataset.archetype;
                    deckCards = [];
                    currentEditingDeckId = null;
                    renderCards();
                    renderDeck();
                });
            });
        }

        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                selectedTypeFilter = tab.dataset.type;
                renderCards();
            });
        });

        // Render cards
        function renderCards() {
            const grid = document.getElementById('cards-grid');
            let cards = CARDS[selectedArchetype] || [];

            // Apply filter
            if (selectedTypeFilter !== 'ALL') {
                cards = cards.filter(c => {
                    if (selectedTypeFilter === 'EVENT') {
                        return c.type === 'EVENT' || c.type === 'EVENT_KEY' || c.type === 'EVENT_FINAL';
                    }
                    if (selectedTypeFilter === 'PERSONAJE') {
                        return c.type === 'PERSONAJE' || c.type === 'CHARACTER';
                    }
                    return c.type === selectedTypeFilter;
                });
            }

            document.getElementById('cards-count').textContent = `(${cards.length})`;

            if (!selectedArchetype) {
                grid.innerHTML = '<p style="color: rgba(255,255,255,0.5); grid-column: 1/-1; text-align: center;">Selecciona un arquetipo</p>';
                return;
            }

            grid.innerHTML = cards.map(card => {
                const countInDeck = deckCards.filter(id => id === card.id).length;
                const maxCopies = card.maxCopies || MAX_COPIES;
                const isMax = countInDeck >= maxCopies;

                return `
                    <div class="card ${isMax ? 'in-deck' : ''}" data-id="${card.id}">
                        <span class="cost">${card.cost}</span>
                        <span class="type-badge ${card.type.toLowerCase()}">${card.type.replace('_', ' ')}</span>
                        <div class="name">${card.name}</div>
                        <div class="desc">${card.desc}</div>
                        ${countInDeck > 0 ? `<span class="count">${countInDeck}/${maxCopies}</span>` : ''}
                    </div>
                `;
            }).join('');

            grid.querySelectorAll('.card').forEach(cardEl => {
                cardEl.addEventListener('click', () => addToDeck(cardEl.dataset.id));
            });
        }

        function addToDeck(cardId) {
            if (!selectedArchetype) return;
            const card = CARDS[selectedArchetype].find(c => c.id === cardId);
            if (!card) return;

            const countInDeck = deckCards.filter(id => id === cardId).length;
            const maxCopies = card.maxCopies || MAX_COPIES;

            if (countInDeck >= maxCopies || deckCards.length >= DECK_SIZE) return;

            deckCards.push(cardId);
            renderCards();
            renderDeck();
        }

        function removeFromDeck(index) {
            deckCards.splice(index, 1);
            renderCards();
            renderDeck();
        }

        function renderDeck() {
            const listEl = document.getElementById('deck-list');
            const countEl = document.getElementById('deck-count');
            const saveBtn = document.getElementById('save-btn');

            countEl.textContent = `${deckCards.length}/${DECK_SIZE}`;
            countEl.className = 'deck-count';
            if (deckCards.length === DECK_SIZE) countEl.classList.add('complete');
            if (deckCards.length > DECK_SIZE) countEl.classList.add('over');

            saveBtn.disabled = deckCards.length !== DECK_SIZE;

            if (deckCards.length === 0) {
                listEl.innerHTML = '<p style="color: rgba(255,255,255,0.5); text-align: center;">Haz clic en las cartas</p>';
                return;
            }

            const grouped = {};
            deckCards.forEach((id, index) => {
                if (!grouped[id]) grouped[id] = { id, indices: [] };
                grouped[id].indices.push(index);
            });

            listEl.innerHTML = Object.values(grouped).map(g => {
                const card = CARDS[selectedArchetype]?.find(c => c.id === g.id);
                return `
                    <div class="deck-item">
                        <span>${g.indices.length}x ${card?.name || g.id}</span>
                        <button class="remove-btn" data-index="${g.indices[g.indices.length - 1]}">−</button>
                    </div>
                `;
            }).join('');

            listEl.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    removeFromDeck(parseInt(btn.dataset.index));
                });
            });
        }

        // Render Backgrounds
        function renderBackgrounds() {
            const container = document.getElementById('bg-selector');
            container.innerHTML = BACKGROUNDS.map(bg => `
                <div class="bg-option ${bg === selectedBackground ? 'selected' : ''}" 
                     data-bg="${bg}"
                     style="background-image: url('/assets/backgrounds/${bg}.svg')">
                </div>
            `).join('');

            container.querySelectorAll('.bg-option').forEach(el => {
                el.addEventListener('click', () => {
                    selectedBackground = el.dataset.bg;
                    renderBackgrounds();
                });
            });
        }

        async function loadCardCatalog() {
            const messageEl = document.getElementById('message');

            try {
                const res = await fetch(`${API_URL}/cards`);
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'No se pudo cargar el catalogo');
                }

                Object.keys(CARDS).forEach(key => delete CARDS[key]);
                Object.assign(CARDS, data.cards || {});
            } catch (err) {
                console.error('Failed to load card catalog:', err);
                messageEl.textContent = err.message || 'No se pudo cargar el catalogo';
                messageEl.className = 'message error';
            }
        }

        // Load decks
        async function loadUserDecks() {
            try {
                const res = await fetch(`${API_URL}/decks`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    savedDecks = data.decks || [];
                    renderDeckDropdown();
                }
            } catch (err) {
                console.error('Failed to load decks:', err);
            }
        }

        function renderDeckDropdown() {
            const dropdown = document.getElementById('deck-dropdown');
            dropdown.innerHTML = '<option value="">--- Nuevo Mazo ---</option>' +
                savedDecks.map(d => `<option value="${d.id}">${d.name} (${d.archetypeId})</option>`).join('');
        }

        document.getElementById('load-btn').addEventListener('click', () => {
            const deckId = document.getElementById('deck-dropdown').value;
            if (!deckId) {
                deckCards = [];
                currentEditingDeckId = null;
                renderCards();
                renderDeck();
                return;
            }

            const deck = savedDecks.find(d => d.id === deckId);
            if (deck) {
                selectedArchetype = deck.archetypeId;
                document.querySelectorAll('.archetype-btn').forEach(b => {
                    b.classList.toggle('selected', b.dataset.archetype === selectedArchetype);
                });
                deckCards = [...deck.cards];
                currentEditingDeckId = deckId;
                document.getElementById('deck-name').value = deck.name;
                selectedBackground = deck.backgroundId || 'bg_01';
                renderCards();
                renderDeck();
                renderBackgrounds();
            }
        });

        // Save deck
        document.getElementById('save-btn').addEventListener('click', async () => {
            const name = document.getElementById('deck-name').value || 'Mi Mazo';
            const messageEl = document.getElementById('message');
            const saveBtn = document.getElementById('save-btn');

            saveBtn.disabled = true;
            messageEl.textContent = '';

            try {
                const method = currentEditingDeckId ? 'PUT' : 'POST';
                const url = currentEditingDeckId ? `${API_URL}/decks/${currentEditingDeckId}` : `${API_URL}/decks`;

                const res = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        name,
                        archetypeId: selectedArchetype,
                        cardIds: deckCards,
                        backgroundId: selectedBackground
                    })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Error al guardar');

                messageEl.textContent = '¡Mazo guardado!';
                messageEl.className = 'message success';
                localStorage.setItem('activeDeckId', data.deck.id);
                document.getElementById('continue-btn').style.display = 'block';
                loadUserDecks();

            } catch (err) {
                messageEl.textContent = err.message;
                messageEl.className = 'message error';
            } finally {
                saveBtn.disabled = deckCards.length !== DECK_SIZE;
            }
        });

        document.getElementById('continue-btn').addEventListener('click', () => {
            window.location.href = '/match.html';
        });

        // Init
        async function init() {
            await loadCardCatalog();
            renderArchetypes();
            renderBackgrounds();
            await loadUserDecks();
            if (localStorage.getItem('activeDeckId')) {
                document.getElementById('continue-btn').style.display = 'block';
            }
        }

        init();
    </script>
