<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Narrative - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
        }

        .tab.active {
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.2);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
            min-height: 20px;
        }

        .success {
            color: #4ecdc4;
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
        }

        .wiki-link {
            display: block;
            margin-top: 14px;
            color: rgba(255, 255, 255, 0.75);
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .wiki-link:hover {
            color: #fff;
        }

        #register-form {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TCG Narrative</h1>
        <p class="subtitle">Build your story, defeat your opponent</p>

        <div class="tabs">
            <button class="tab active" id="login-tab">Login</button>
            <button class="tab" id="register-tab">Register</button>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn" id="login-btn">Login</button>
            <p class="error" id="login-error"></p>
        </form>

        <form id="register-form">
            <div class="form-group">
                <label for="register-username">Username</label>
                <input type="text" id="register-username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" placeholder="Choose a password" required>
            </div>
            <div class="form-group">
                <label for="register-confirm">Confirm Password</label>
                <input type="password" id="register-confirm" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="btn" id="register-btn">Create Account</button>
            <p class="error" id="register-error"></p>
            <p class="success" id="register-success"></p>
        </form>
        <a class="wiki-link" href="/wiki.html">Wiki y reglas</a>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        // Tab switching
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.style.display = 'block';
            loginForm.style.display = 'none';
        });

        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            errorEl.textContent = '';

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                // Store token and redirect
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                window.location.href = '/build.html';

            } catch (err) {
                errorEl.textContent = err.message;
            } finally {
                btn.disabled = false;
            }
        });

        // Register
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const errorEl = document.getElementById('register-error');
            const successEl = document.getElementById('register-success');
            const btn = document.getElementById('register-btn');

            btn.disabled = true;
            errorEl.textContent = '';
            successEl.textContent = '';

            if (password !== confirm) {
                errorEl.textContent = 'Passwords do not match';
                btn.disabled = false;
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Registration failed');
                }

                // Store token and redirect
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                window.location.href = '/build.html';

            } catch (err) {
                errorEl.textContent = err.message;
            } finally {
                btn.disabled = false;
            }
        });

        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/build.html';
        }
    </script>
</body>
</html>
