<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Narrative - Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
        }

        .wiki-link {
            position: fixed;
            left: 14px;
            bottom: 14px;
            z-index: 12;
            padding: 9px 12px;
            border: 1px solid rgba(255, 255, 255, 0.42);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.72);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.86rem;
        }

        .anime-log-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 330px;
            height: 100vh;
            padding: 18px 18px 22px;
            background: rgba(0, 0, 0, 0.82);
            border-left: 1px solid rgba(255, 255, 255, 0.22);
            z-index: 10;
            overflow: hidden;
            transition: transform 180ms ease;
        }

        .anime-log-panel.closed {
            transform: translateX(100%);
        }

        .anime-log-title {
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #4ecdc4;
            margin-bottom: 14px;
            font-weight: 700;
        }

        .anime-log-content {
            height: calc(100vh - 126px);
            overflow-y: auto;
            padding-right: 6px;
        }

        .anime-log-content.hidden {
            display: none;
        }

        .anime-log-content p {
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.82);
            font-size: 0.88rem;
            line-height: 1.35;
        }

        .anime-log-content strong {
            color: #fff;
            font-weight: 800;
        }

        .anime-chat-form {
            display: flex;
            gap: 6px;
            height: 42px;
            margin-top: 10px;
        }

        .anime-chat-input {
            min-width: 0;
            flex: 1;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, .22);
            border-radius: 6px;
            background: rgba(255, 255, 255, .06);
            color: #fff;
        }

        .anime-chat-form button {
            padding: 0 11px;
            border: 1px solid #4ecdc4;
            border-radius: 6px;
            background: rgba(78, 205, 196, .14);
            color: #fff;
            font-weight: 700;
        }

        .anime-chat-form :disabled {
            opacity: .45;
        }

        .anime-log-toggle {
            display: block;
            position: fixed;
            top: 14px;
            right: 348px;
            z-index: 11;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.86);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: right 180ms ease;
        }

        .anime-log-toggle.closed {
            right: 14px;
        }

        @media (max-width: 919px) {
            .wiki-link {
                display: none;
            }

            .anime-log-panel {
                top: auto;
                bottom: 0;
                width: 100vw;
                height: min(55vh, 390px);
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.25);
                transform: translateY(100%);
            }

            .anime-log-panel.open {
                transform: translateY(0);
            }

            .anime-log-panel.closed {
                transform: translateY(100%);
            }

            .anime-log-content {
                height: calc(min(55vh, 390px) - 126px);
            }

            .anime-log-toggle {
                top: auto;
                right: 14px;
                bottom: 18px;
            }
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <a class="wiki-link" href="/wiki.html" target="_blank">Wiki</a>
    <script type="module" src="/src/battle.ts"></script>
</body>

</html>
