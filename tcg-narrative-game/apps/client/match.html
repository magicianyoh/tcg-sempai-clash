<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Narrative - Find Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-btns {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1040px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .panel h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .match-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .match-btn {
            padding: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .match-btn:hover:not(:disabled) {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .match-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .match-btn.quick {
            border-color: #e94560;
        }

        .match-btn.quick:hover:not(:disabled) {
            background: rgba(233, 69, 96, 0.1);
        }

        .match-btn.create {
            border-color: #4ecdc4;
        }

        .match-btn.create:hover:not(:disabled) {
            background: rgba(78, 205, 196, 0.1);
        }

        .match-btn.cpu {
            border-color: #f39c12;
        }

        .match-btn.cpu:hover:not(:disabled) {
            background: rgba(243, 156, 18, 0.1);
        }

        .match-btn .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .match-btn .title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .match-btn .desc {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Lobby Section */
        .lobby-section {
            display: none;
        }

        .lobby-section.active {
            display: block;
        }

        .join-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .join-input {
            flex: 1;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .join-btn {
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .join-btn:hover {
            transform: translateY(-2px);
        }

        .cpu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .field-label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.85rem;
        }

        .select-input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
        }

        .select-input option {
            background: #1a1a2e;
        }

        .timer-option {
            margin: 4px 0 18px;
            padding: 12px 14px;
            border: 1px solid rgba(78, 205, 196, 0.35);
            background: rgba(0, 0, 0, 0.22);
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            color: #d7dee9;
            font-weight: 700;
        }

        .timer-option input {
            width: 18px;
            height: 18px;
            accent-color: #4ecdc4;
        }

        .cpu-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .start-cpu-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #f39c12, #e67e22);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        .start-cpu-btn:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        /* Lobby State */
        .lobby-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
        }

        .lobby-code {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 8px;
            color: #4ecdc4;
            margin-bottom: 20px;
        }

        .lobby-players {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .player-slot {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            text-align: center;
        }

        .player-slot.ready {
            border-color: #4ecdc4;
            background: rgba(78, 205, 196, 0.1);
        }

        .player-slot.empty {
            border-style: dashed;
            opacity: 0.5;
        }

        .player-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .player-status {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .lobby-settings {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 0 0 20px;
            flex-wrap: wrap;
        }

        .lobby-settings label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 8px;
            color: rgba(255,255,255,.8);
        }

        .challenge-btn,
        .spectate-btn {
            margin-top: 12px;
            padding: 8px 13px;
            border: 1px solid #4ecdc4;
            border-radius: 7px;
            background: rgba(78,205,196,.13);
            color: #fff;
            cursor: pointer;
        }

        .active-match-list {
            display: grid;
            gap: 8px;
            margin: 12px 0 20px;
        }

        .active-match {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 8px;
            color: rgba(255,255,255,.82);
        }

        .invite-panel {
            margin-bottom: 20px;
            padding: 18px;
            border: 1px solid #4ecdc4;
            border-radius: 10px;
            background: rgba(78,205,196,.1);
            text-align: center;
        }

        .invite-panel p {
            margin-bottom: 12px;
        }

        .invite-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .lobby-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .ready-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ready-btn.is-ready {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
        }

        .leave-btn {
            padding: 12px 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* Queue Status */
        .queue-status {
            text-align: center;
            padding: 40px;
        }

        .queue-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .queue-text {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .queue-timer {
            color: rgba(255, 255, 255, 0.6);
        }

        .cancel-btn {
            margin-top: 20px;
            padding: 12px 30px;
            border: 1px solid #e94560;
            border-radius: 10px;
            background: transparent;
            color: #e94560;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cancel-btn:hover {
            background: rgba(233, 69, 96, 0.1);
        }

        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .message.error {
            color: #e94560;
        }

        .message.success {
            color: #4ecdc4;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Find Match</h1>
        <div class="nav-btns">
            <button class="nav-btn" id="deck-btn">Edit Deck</button>
            <a class="nav-btn" href="/wiki.html">Wiki</a>
            <button class="nav-btn" id="logout-btn">Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Main Options -->
        <div class="panel" id="main-options">
            <h2>Choose Game Mode</h2>
            <div class="match-options">
                <button class="match-btn quick" id="quick-match-btn">
                    <div class="icon">⚡</div>
                    <div class="title">Quick Match</div>
                    <div class="desc">Find an opponent automatically</div>
                </button>
                <button class="match-btn create" id="create-lobby-btn">
                    <div class="icon">🎮</div>
                    <div class="title">Create Lobby</div>
                    <div class="desc">Get a code to invite a friend</div>
                </button>
                <button class="match-btn cpu" id="cpu-match-btn">
                    <div class="icon">CPU</div>
                    <div class="title">Vs CPU</div>
                    <div class="desc">Choose protagonist and difficulty</div>
                </button>
            </div>
            <label class="timer-option">
                <input id="match-timer-enabled" type="checkbox">
                Competitive timer: 1 minute per player
            </label>
        </div>

        <!-- CPU Match -->
        <div class="panel hidden" id="cpu-panel">
            <h2>Play Against CPU</h2>
            <div class="cpu-grid">
                <div>
                    <label class="field-label" for="cpu-archetype">CPU Archetype</label>
                    <select class="select-input" id="cpu-archetype">
                        <option value="SHONEN">Shonen</option>
                        <option value="MECHA">Mecha</option>
                        <option value="SHOJO">Shojo</option>
                        <option value="ISEKAI">Isekai</option>
                    </select>
                </div>
                <div>
                    <label class="field-label" for="cpu-deck">Protagonist / Deck</label>
                    <select class="select-input" id="cpu-deck"></select>
                </div>
                <div>
                    <label class="field-label" for="cpu-difficulty">Difficulty</label>
                    <select class="select-input" id="cpu-difficulty">
                        <option value="easy">Easy - takes risks and makes mistakes</option>
                        <option value="normal" selected>Normal - plans its arc</option>
                        <option value="hard">Hard - optimizes Climax and response</option>
                    </select>
                </div>
            </div>
            <label class="timer-option">
                <input id="cpu-timer-enabled" type="checkbox">
                Competitive timer: 1 minute per player
            </label>
            <div class="cpu-actions">
                <button class="leave-btn" id="cpu-back-btn">Back</button>
                <button class="start-cpu-btn" id="start-cpu-btn">Start CPU Match</button>
            </div>
            <p class="message" id="cpu-message"></p>
        </div>

        <!-- Join Lobby -->
        <div class="panel lobby-section" id="join-section">
            <h2>Join a Lobby</h2>
            <div class="join-form">
                <input type="text" class="join-input" id="lobby-code-input" placeholder="ENTER CODE" maxlength="6">
                <button class="join-btn" id="join-btn">Join</button>
            </div>
            <p class="message" id="join-message"></p>
        </div>

        <!-- Queue Status -->
        <div class="panel hidden" id="queue-panel">
            <div class="queue-status">
                <div class="queue-spinner"></div>
                <div class="queue-text">Searching for opponent...</div>
                <div class="queue-timer" id="queue-timer">0:00</div>
                <button class="cancel-btn" id="cancel-queue-btn">Cancel</button>
            </div>
        </div>

        <!-- Lobby View -->
        <div class="panel hidden" id="lobby-panel">
            <h2>Lobby</h2>
            <div class="lobby-info">
                <div class="lobby-code" id="lobby-display-code">------</div>
                <div class="invite-panel hidden" id="invite-panel">
                    <p id="invite-copy"></p>
                    <div class="invite-actions">
                        <button class="ready-btn" id="accept-invite-btn">Accept</button>
                        <button class="leave-btn" id="reject-invite-btn">Reject</button>
                    </div>
                </div>
                <div class="lobby-settings">
                    <label><input id="invite-timer-enabled" type="checkbox"> 1-minute timer</label>
                    <label><input id="invite-private-enabled" type="checkbox"> Private match</label>
                </div>
                <div class="lobby-players" id="lobby-players">
                    <div class="player-slot empty">
                        <div class="player-name">Waiting...</div>
                        <div class="player-status">-</div>
                    </div>
                    <div class="player-slot empty">
                        <div class="player-name">Waiting...</div>
                        <div class="player-status">-</div>
                    </div>
                </div>
                <h2>Active matches</h2>
                <div class="active-match-list" id="active-match-list">
                    <p class="player-status">No active matches yet.</p>
                </div>
                <div class="lobby-actions">
                    <button class="leave-btn" id="leave-btn">Leave</button>
                </div>
            </div>
            <p class="message" id="lobby-message"></p>
        </div>
    </div>

    <script>
        const DEPLOY_API_URL = String.raw`%VITE_API_URL%`.trim();
        const API_URL = DEPLOY_API_URL && !DEPLOY_API_URL.startsWith('%')
            ? DEPLOY_API_URL.replace(/\/$/, '')
            : window.location.origin;
        const WS_PROTOCOL = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const DEPLOY_WS_URL = String.raw`%VITE_WS_URL%`.trim();
        const WS_URL = DEPLOY_WS_URL && !DEPLOY_WS_URL.startsWith('%')
            ? DEPLOY_WS_URL.replace(/\/$/, '')
            : `${WS_PROTOCOL}//${window.location.host}/ws`;

        // State
        let ws = null;
        let currentLobby = null;
        let queueStartTime = null;
        let queueTimer = null;
        let pendingInvite = null;
        let cpuDecks = [];

        // Auth check
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        let activeDeckId = localStorage.getItem('activeDeckId');

        if (!token) {
            window.location.href = '/auth.html';
        }

        function clearExpiredSession() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('activeDeckId');
            localStorage.removeItem('currentMatchId');
            window.location.href = '/auth.html';
        }

        async function readJsonResponse(res) {
            const data = await res.json().catch(() => ({}));
            if (res.status === 401 || res.status === 403) {
                clearExpiredSession();
                throw new Error('Session expired. Please sign in again.');
            }
            return data;
        }

        async function refreshActiveDeck() {
            if (!token) return null;

            try {
                const meRes = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const me = await readJsonResponse(meRes);
                if (meRes.ok && me.activeDeckId) {
                    activeDeckId = me.activeDeckId;
                    localStorage.setItem('activeDeckId', activeDeckId);
                    return activeDeckId;
                }

                const decksRes = await fetch(`${API_URL}/decks`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const decksData = await readJsonResponse(decksRes);
                const decks = decksData.decks || [];
                const localDeck = decks.find(deck => deck.id === activeDeckId);
                const fallbackDeck = localDeck || decks[0];
                if (decksRes.ok && fallbackDeck) {
                    activeDeckId = fallbackDeck.id;
                    localStorage.setItem('activeDeckId', activeDeckId);
                    return activeDeckId;
                }
            } catch (err) {
                console.error('Failed to refresh active deck:', err);
            }

            activeDeckId = null;
            localStorage.removeItem('activeDeckId');
            return null;
        }

        async function ensureActiveDeck() {
            const deckId = await refreshActiveDeck();
            if (!deckId) {
                alert('Please create a deck first!');
                window.location.href = '/build.html';
                return null;
            }
            return deckId;
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[char]));
        }

        // Navigation
        document.getElementById('deck-btn').addEventListener('click', () => {
            window.location.href = '/build.html';
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            if (ws) ws.close();
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/auth.html';
        });

        // Connect WebSocket
        function connectWS() {
            return new Promise((resolve, reject) => {
                ws = new WebSocket(`${WS_URL}?token=${token}`);

                ws.onopen = () => {
                    console.log('WS Connected');
                    resolve();
                };

                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    handleWSMessage(msg);
                };

                ws.onerror = (err) => {
                    console.error('WS Error', err);
                    reject(err);
                };

                ws.onclose = () => {
                    console.log('WS Disconnected');
                };
            });
        }

        // Handle WS messages
        function handleWSMessage(msg) {
            console.log('WS Message:', msg);

            switch (msg.type) {
                case 'AUTH_OK':
                    console.log('Authenticated as', msg.payload.username);
                    break;

                case 'ERROR':
                    showError(msg.payload.message);
                    break;

                case 'LOBBY_STATE':
                    currentLobby = msg.payload.lobby;
                    showLobby();
                    break;

                case 'LOBBY_INVITE':
                    pendingInvite = msg.payload;
                    document.getElementById('invite-copy').textContent =
                        `${pendingInvite.fromUsername} invited you to a${pendingInvite.privateMatch ? ' private' : ''} match${pendingInvite.timerEnabled ? ' with timer' : ''}.`;
                    document.getElementById('invite-panel').classList.remove('hidden');
                    break;

                case 'LOBBY_INVITE_RESULT':
                    document.getElementById('lobby-message').textContent = msg.payload.message;
                    document.getElementById('lobby-message').className = 'message success';
                    break;

                case 'MATCH_FOUND':
                    console.log('Match found!', msg.payload.matchId);
                    localStorage.setItem('currentMatchId', msg.payload.matchId);
                    window.location.href = `/battle.html?matchId=${msg.payload.matchId}${msg.payload.spectator ? '&spectator=1' : ''}`;
                    break;

                case 'MATCH_STATE':
                    if (msg.payload.matchState?.matchId && !window.location.pathname.endsWith('/battle.html')) {
                        localStorage.setItem('currentMatchId', msg.payload.matchState.matchId);
                        window.location.href = `/battle.html?matchId=${msg.payload.matchState.matchId}`;
                    }
                    break;
            }
        }

        function showError(message) {
            alert('Error: ' + message);
        }

        // Quick Match
        document.getElementById('quick-match-btn').addEventListener('click', async () => {
            const deckId = await ensureActiveDeck();
            if (!deckId) return;

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                await connectWS();
            }

            ws.send(JSON.stringify({
                type: 'MATCHMAKE_QUEUE',
                payload: {
                    formatId: 'standard',
                    deckId,
                    timerEnabled: document.getElementById('match-timer-enabled').checked
                }
            }));

            document.getElementById('main-options').classList.add('hidden');
            document.getElementById('join-section').classList.add('hidden');
            document.getElementById('queue-panel').classList.remove('hidden');
            startQueueTimer();
        });

        // Cancel Queue
        document.getElementById('cancel-queue-btn').addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'MATCHMAKE_CANCEL', payload: {} }));
            }
            stopQueueTimer();
            document.getElementById('queue-panel').classList.add('hidden');
            document.getElementById('main-options').classList.remove('hidden');
            document.getElementById('join-section').classList.remove('hidden');
        });

        // CPU Match
        async function loadCpuDecks() {
            const res = await fetch(`${API_URL}/prebuilt-decks`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await readJsonResponse(res);
            if (!res.ok) throw new Error(data.error || 'No se pudieron cargar los decks CPU');
            cpuDecks = data.decks || [];
            renderCpuDecks();
        }

        function renderCpuDecks() {
            const archetype = document.getElementById('cpu-archetype').value;
            const decks = cpuDecks.filter(deck => deck.archetypeId === archetype);
            document.getElementById('cpu-deck').innerHTML = decks.map(deck =>
                `<option value="${deck.id}">${deck.protagonistName || deck.name}</option>`
            ).join('');
        }

        document.getElementById('cpu-archetype').addEventListener('change', renderCpuDecks);
        document.getElementById('cpu-match-btn').addEventListener('click', async () => {
            document.getElementById('main-options').classList.add('hidden');
            document.getElementById('join-section').classList.add('hidden');
            document.getElementById('cpu-panel').classList.remove('hidden');
            try {
                await loadCpuDecks();
            } catch (err) {
                document.getElementById('cpu-message').textContent = err.message;
                document.getElementById('cpu-message').className = 'message error';
            }
        });

        document.getElementById('cpu-back-btn').addEventListener('click', () => {
            document.getElementById('cpu-panel').classList.add('hidden');
            document.getElementById('main-options').classList.remove('hidden');
            document.getElementById('join-section').classList.remove('hidden');
            document.getElementById('cpu-message').textContent = '';
        });

        document.getElementById('start-cpu-btn').addEventListener('click', async () => {
            const btn = document.getElementById('start-cpu-btn');
            const messageEl = document.getElementById('cpu-message');
            const cpuArchetypeId = document.getElementById('cpu-archetype').value;
            const cpuDeckId = document.getElementById('cpu-deck').value;
            const difficulty = document.getElementById('cpu-difficulty').value;

            btn.disabled = true;
            messageEl.textContent = 'Creating CPU match...';
            messageEl.className = 'message';

            try {
                const deckId = await ensureActiveDeck();
                if (!deckId) return;

                const res = await fetch(`${API_URL}/cpu-match`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        deckId,
                        cpuArchetypeId,
                        cpuDeckId,
                        difficulty,
                        formatId: 'standard',
                        timerEnabled: document.getElementById('cpu-timer-enabled').checked
                    })
                });

                const data = await readJsonResponse(res);
                if (!res.ok) throw new Error(data.error || 'Could not create CPU match');

                localStorage.setItem('currentMatchId', data.matchId);
                window.location.href = `/battle.html?matchId=${data.matchId}`;
            } catch (err) {
                messageEl.textContent = err.message;
                messageEl.className = 'message error';
            } finally {
                btn.disabled = false;
            }
        });

        // Queue Timer
        function startQueueTimer() {
            queueStartTime = Date.now();
            queueTimer = setInterval(() => {
                const elapsed = Math.floor((Date.now() - queueStartTime) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                document.getElementById('queue-timer').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function stopQueueTimer() {
            if (queueTimer) clearInterval(queueTimer);
            queueTimer = null;
        }

        // Create Lobby
        document.getElementById('create-lobby-btn').addEventListener('click', async () => {
            const deckId = await ensureActiveDeck();
            if (!deckId) return;

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                await connectWS();
            }

            ws.send(JSON.stringify({
                type: 'LOBBY_CREATE',
                payload: { formatId: 'standard' }
            }));
        });

        // Join Lobby
        document.getElementById('join-btn').addEventListener('click', async () => {
            const code = document.getElementById('lobby-code-input').value.toUpperCase().trim();
            if (code.length !== 6) {
                document.getElementById('join-message').textContent = 'Code must be 6 characters';
                document.getElementById('join-message').className = 'message error';
                return;
            }

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                await connectWS();
            }

            ws.send(JSON.stringify({
                type: 'LOBBY_JOIN',
                payload: { code }
            }));
        });

        function showLobby() {
            document.getElementById('main-options').classList.add('hidden');
            document.getElementById('join-section').classList.add('hidden');
            document.getElementById('queue-panel').classList.add('hidden');
            document.getElementById('lobby-panel').classList.remove('hidden');
            document.getElementById('lobby-display-code').textContent = currentLobby.code;

            const matches = (currentLobby.activeMatches || []).filter(match => match.status === 'active');
            const matchById = new Map(matches.map(match => [match.matchId, match]));
            const playersEl = document.getElementById('lobby-players');
            playersEl.innerHTML = currentLobby.players.map(player => `
                <div class="player-slot ${player.activeMatchId ? 'ready' : ''}">
                    <div class="player-name">${escapeHtml(player.username)}</div>
                    <div class="player-status">${player.activeMatchId ? 'In match' : 'Available'}</div>
                    ${player.username !== username && !player.activeMatchId
                        ? `<button class="challenge-btn" data-challenge="${escapeHtml(player.username)}">Challenge</button>`
                        : ''}
                    ${player.username !== username && player.activeMatchId && !matchById.get(player.activeMatchId)?.privateMatch
                        ? `<button class="spectate-btn" data-spectate="${escapeHtml(player.activeMatchId)}">Spectate</button>`
                        : ''}
                </div>
            `).join('');
            playersEl.querySelectorAll('[data-challenge]').forEach(button => {
                button.addEventListener('click', () => invitePlayer(button.dataset.challenge));
            });
            playersEl.querySelectorAll('[data-spectate]').forEach(button => {
                button.addEventListener('click', () => {
                    ws.send(JSON.stringify({ type: 'MATCH_SPECTATE', payload: { matchId: button.dataset.spectate } }));
                });
            });
            const matchesEl = document.getElementById('active-match-list');
            matchesEl.innerHTML = matches.length
                ? matches.map(match => `
                    <div class="active-match">
                        <span>${escapeHtml(match.players.join(' vs '))}${match.privateMatch ? ' / Private' : ''}</span>
                        ${!match.privateMatch && !match.players.includes(username)
                            ? `<button class="spectate-btn" data-spectate="${escapeHtml(match.matchId)}">Spectate</button>`
                            : ''}
                    </div>
                `).join('')
                : '<p class="player-status">No active matches yet.</p>';
            matchesEl.querySelectorAll('[data-spectate]').forEach(button => {
                button.addEventListener('click', () => {
                    ws.send(JSON.stringify({ type: 'MATCH_SPECTATE', payload: { matchId: button.dataset.spectate } }));
                });
            });
        }

        async function invitePlayer(targetUsername) {
            if (!currentLobby) return;
            const deckId = await ensureActiveDeck();
            if (!deckId) return;
            ws.send(JSON.stringify({
                type: 'LOBBY_CHALLENGE',
                payload: {
                    lobbyId: currentLobby.lobbyId,
                    targetUsername,
                    deckId,
                    timerEnabled: document.getElementById('invite-timer-enabled').checked,
                    privateMatch: document.getElementById('invite-private-enabled').checked
                }
            }));
        }

        document.getElementById('accept-invite-btn').addEventListener('click', async () => {
            if (!pendingInvite) return;
            const deckId = await ensureActiveDeck();
            if (!deckId) return;
            ws.send(JSON.stringify({
                type: 'LOBBY_CHALLENGE_RESPONSE',
                payload: { challengeId: pendingInvite.challengeId, accepted: true, deckId }
            }));
            pendingInvite = null;
            document.getElementById('invite-panel').classList.add('hidden');
        });

        document.getElementById('reject-invite-btn').addEventListener('click', () => {
            if (!pendingInvite) return;
            ws.send(JSON.stringify({
                type: 'LOBBY_CHALLENGE_RESPONSE',
                payload: { challengeId: pendingInvite.challengeId, accepted: false }
            }));
            pendingInvite = null;
            document.getElementById('invite-panel').classList.add('hidden');
        });

        // Leave Lobby
        document.getElementById('leave-btn').addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'LOBBY_LEAVE', payload: {} }));
            }
            currentLobby = null;
            pendingInvite = null;
            document.getElementById('invite-panel').classList.add('hidden');
            document.getElementById('lobby-panel').classList.add('hidden');
            document.getElementById('main-options').classList.remove('hidden');
            document.getElementById('join-section').classList.remove('hidden');
        });

        // Show join section by default
        document.getElementById('join-section').classList.add('lobby-section', 'active');

        // Initial deck sync
        ensureActiveDeck();
    </script>
</body>

</html>
