services:
  - type: web
    name: senpai-clash-api
    runtime: node
    plan: free
    rootDir: tcg-narrative-game/apps/server
    buildCommand: npm install --include=dev && npm run build && npm test
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: https://senpai-clash.vercel.app
      - key: STORE_DB_PATH
        value: ./data/db.json
